services:

  certs-init:
    build:
      context: ./certs-init
    container_name: ft_transcendence_certs
    volumes:
      - ./certs:/certs
    # Exits after generating certs

  nginx:
    image: nginx:latest
    container_name: ft_transcendence_nginx
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      certs-init:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ft_transcendence_backend

    # Backend is not exposed directly to the host. All requests route through nginx reverse proxy
    # which provides SSL termination and secure HTTPS communication.

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - backend_db:/app/plantapp
      - ./certs:/certs:ro

    restart: unless-stopped

    command: daphne -e ssl:8000:privateKey=/certs/backend.key:certKey=/certs/backend.crt mysite.asgi:application

    depends_on:
      certs-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ft_transcendence_backend_migrate

    volumes:
      - ./backend:/app
      - backend_db:/app/plantapp
    env_file:
      - ./backend/.env
    command: python manage.py migrate

    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev

    container_name: ft_transcendence_frontend

    # ports:
    #   - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://localhost:8443
      - NEXT_PUBLIC_WS_URL=wss://localhost:8443
      - NODE_EXTRA_CA_CERTS=/certs/ca.crt

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./certs:/certs:ro
    depends_on:
      certs-init:
        condition: service_completed_successfully
      backend:
         condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379" # needed for testing purposes
    # Redis is used ONLY for Django Channels (WebSocket routing), NOT for message storage.
    # Messages are persisted in the database. Redis data is ephemeral and can be safely lost.
    # --save "" --appendonly no: Disables persistence for better performance.
    # If Redis restarts, users simply reconnect WebSockets and reload messages from DB.
    command: redis-server --save "" --appendonly no

volumes:
  backend_db:
  frontend_node_modules:

