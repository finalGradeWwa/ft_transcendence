services:

  nginx:
    image: nginx:latest
    container_name: ft_transcendence_nginx
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/entrypoint:/docker-entrypoint.d:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    
    container_name: ft_transcendence_backend
    
    # Backend is not exposed directly to the host. All requests route through nginx reverse proxy
    # which provides SSL termination and secure HTTPS communication.

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - backend_db:/app/plantapp
    
    restart: unless-stopped

    depends_on:
      redis:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    
    container_name: ft_transcendence_backend_migrate
    
    volumes:
      - ./backend:/app
      - backend_db:/app/plantapp
    env_file:
      - ./backend/.env
    command: python manage.py migrate
    
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    
    container_name: ft_transcendence_frontend
    
    # ports:
    #   - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://localhost:8443
      - NEXT_PUBLIC_WS_URL=wss://localhost:8443
    
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6380}:6379" # host port configurable; defaults to 6380 to avoid conflicts
    # Redis is used ONLY for Django Channels (WebSocket routing), NOT for message storage.
    # Messages are persisted in the database. Redis data is ephemeral and can be safely lost.
    # --save "" --appendonly no: Disables persistence for better performance.
    # If Redis restarts, users simply reconnect WebSockets and reload messages from DB.
    command: redis-server --save "" --appendonly no

volumes:
  backend_db:
  frontend_node_modules:

